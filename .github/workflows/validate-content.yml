name: Validate content

# Runs on every PR to main so branch protection can require it. When a PR
# doesn't touch content/ or shared schemas, the job short-circuits and reports
# success without doing work. This lets us require the check for all merges
# while keeping code-only PRs fast.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - name: Detect whether content or schemas changed
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.event.after }}"
          fi
          if git diff --name-only "$BASE" "$HEAD" | grep -qE '^(content/|src/shared/|scripts/validate-content\.ts|\.github/workflows/validate-content\.yml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No content or schema changes; skipping validation."
          fi
      - uses: actions/setup-node@v4
        if: steps.changed.outputs.changed == 'true'
        with:
          node-version: '20'
          cache: npm
      - name: Install root deps
        if: steps.changed.outputs.changed == 'true'
        run: npm ci
      - name: Validate content
        if: steps.changed.outputs.changed == 'true'
        run: npm run validate-content
